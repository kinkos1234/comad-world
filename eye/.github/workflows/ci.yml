name: CI

on:
  push:
    branches:
      - master
      - main
      - "autoresearch/**"
  pull_request:
    branches:
      - master
      - main
      - "autoresearch/**"

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install flake8 mypy types-PyYAML

      - name: Syntax check all Python files
        run: |
          python -c "
          import ast, sys, pathlib
          errors = []
          for path in pathlib.Path('.').rglob('*.py'):
            if any(part in path.parts for part in ['.venv', 'venv', 'node_modules', '__pycache__']):
              continue
            try:
              ast.parse(path.read_text(encoding='utf-8'))
            except SyntaxError as e:
              errors.append(f'{path}: {e}')
          if errors:
            print('Syntax errors found:')
            for e in errors:
              print(' ', e)
            sys.exit(1)
          print(f'All Python files passed syntax check.')
          "

      - name: Lint with flake8
        run: |
          flake8 .

      - name: Type check core modules with mypy
        run: |
          mypy utils/config.py graph/neo4j_client.py --ignore-missing-imports --no-error-summary

      - name: Run pytest with coverage
        run: |
          pip install pytest pytest-cov
          if [ -d tests ]; then
            pytest tests/ -v --cov=utils --cov=graph --cov-report=term-missing --cov-fail-under=50
          else
            echo "No tests/ directory found, skipping pytest."
          fi

  # frontend job disabled — frontend/ is tracked as a git submodule
  # and needs separate CI setup. Re-enable after fixing submodule config.
