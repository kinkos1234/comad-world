# Layer 7: Logic — Action Type 전제조건 + 효과 정의

actions:
  # === Investor Actions ===
  SELL:
    description: "투자자가 보유 자산을 매도"
    actor_types: ["Investor", "ForeignInvestor", "InstitutionalInvestor", "RetailInvestor"]
    target_types: ["Stock", "Market", "Sector"]
    priority: 8
    cooldown: 2
    preconditions:
      - type: property
        target: self
        property: stance
        operator: "<"
        value: -0.3
      - type: property
        target: self
        property: volatility
        operator: ">"
        value: 0.5
    effects:
      - target: target
        property: price_pressure
        operation: subtract
        value: "self.influence_score * 0.3"
      - target: self
        property: activity_level
        operation: add
        value: 0.2

  BUY:
    description: "투자자가 자산을 매수"
    actor_types: ["Investor", "ForeignInvestor", "InstitutionalInvestor", "RetailInvestor"]
    target_types: ["Stock", "Market", "Sector"]
    priority: 7
    cooldown: 2
    preconditions:
      - type: property
        target: self
        property: stance
        operator: ">"
        value: 0.3
      - type: property
        target: self
        property: volatility
        operator: "<"
        value: 0.7
    effects:
      - target: target
        property: price_pressure
        operation: add
        value: "self.influence_score * 0.3"

  FLIGHT_TO_SAFETY:
    description: "고변동성 환경에서 안전자산으로 이동"
    actor_types: ["Investor", "ForeignInvestor", "InstitutionalInvestor"]
    target_types: []
    priority: 9
    cooldown: 3
    preconditions:
      - type: property
        target: self
        property: volatility
        operator: ">"
        value: 0.7
    effects:
      - target: high_risk_relationships
        property: weight
        operation: multiply
        value: 0.7
      - target: low_risk_relationships
        property: weight
        operation: multiply
        value: 1.3

  # === Company/Government Actions ===
  ANNOUNCE:
    description: "기업/정부가 정책이나 결과를 발표"
    actor_types: ["Company", "ListedCompany", "Government", "CentralBank"]
    target_types: []
    priority: 10
    cooldown: 5
    preconditions:
      - type: property
        target: self
        property: has_pending_event
        operator: "=="
        value: true
    effects:
      - target: related_entities
        relation: REACTS_TO
        operation: create_edge
        properties:
          weight: "self.influence_score * 0.5"

  INNOVATE:
    description: "기업이 기술 혁신을 수행"
    actor_types: ["Company", "ListedCompany"]
    target_types: []
    priority: 5
    cooldown: 5
    preconditions:
      - type: property
        target: self
        property: activity_level
        operator: ">"
        value: 0.6
      - type: property
        target: self
        property: stance
        operator: ">"
        value: 0.2
    effects:
      - target: self
        property: influence_score
        operation: add
        value: 0.1
      - target: related_sector
        property: stance
        operation: add
        value: 0.05

  INVEST:
    description: "투자자/기업이 대상에 투자"
    actor_types: ["Investor", "Company", "InstitutionalInvestor"]
    target_types: ["Company", "ListedCompany", "Technology", "Sector"]
    priority: 6
    cooldown: 3
    preconditions:
      - type: property
        target: self
        property: stance
        operator: ">"
        value: 0.4
      - type: property
        target: target
        property: stance
        operator: ">"
        value: 0.0
    effects:
      - target: null
        operation: create_edge
        link_type: DEPENDS_ON
        source: self
        properties:
          weight: 0.5

  # === Event Actions ===
  SHOCK:
    description: "이벤트가 연결된 엔티티에 충격을 전달"
    actor_types: ["Event", "PriceMovement", "PolicyAnnouncement", "Geopolitical"]
    target_types: []
    priority: 10
    cooldown: 0
    preconditions:
      - type: property
        target: self
        property: magnitude
        operator: ">"
        value: 0.7
    effects:
      - target: connected_entities
        relation: IMPACTS
        property: volatility
        operation: add
        value: "self.magnitude * edge.weight * target.susceptibility"

  TRIGGER_CHAIN:
    description: "이벤트가 연결된 잠재 이벤트를 활성화"
    actor_types: ["Event"]
    target_types: ["Event"]
    priority: 10
    cooldown: 0
    preconditions:
      - type: relationship
        pattern: "(self)-[:LEADS_TO]->(target:Event)"
        condition: exists
    effects:
      - target: target
        property: is_active
        operation: set
        value: true

  # === Entity-Entity Actions ===
  FORM_ALLIANCE:
    description: "stance가 유사한 엔티티 간 동맹 형성"
    actor_types: ["Actor", "Company", "Investor", "Government"]
    target_types: ["Actor", "Company", "Investor", "Government"]
    priority: 4
    cooldown: 5
    preconditions:
      - type: property
        comparison: "abs(self.stance - target.stance)"
        operator: "<"
        value: 0.2
      - type: community
        condition: "self.community_id == target.community_id"
    effects:
      - target: null
        operation: create_edge
        link_type: ALLIED_WITH
        properties:
          weight: "1.0 - abs(self.stance - target.stance)"

  BREAK_ALLIANCE:
    description: "stance 차이가 커진 엔티티 간 동맹 해제"
    actor_types: ["Actor", "Company", "Investor", "Government"]
    target_types: ["Actor", "Company", "Investor", "Government"]
    priority: 6
    cooldown: 3
    preconditions:
      - type: property
        comparison: "abs(self.stance - target.stance)"
        operator: ">"
        value: 0.6
      - type: relationship
        pattern: "(self)-[:ALLIED_WITH]->(target)"
        condition: exists
    effects:
      - target: null
        relation: ALLIED_WITH
        operation: expire_edge
