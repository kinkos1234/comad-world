# Layer 1: Glossary — 도메인 용어 사전 (Single Source of Truth)

terms:
  entity:
    definition: "시드데이터에서 추출된, 그래프의 노드가 되는 개체"
    aliases: ["엔티티", "노드", "개체"]
    not: ["에이전트(MiroFish 용어, ComadEye에서는 사용하지 않음)"]

  stance:
    definition: "엔티티의 현재 입장/태도를 [-1.0, 1.0] 범위로 표현한 수치"
    unit: "float"
    range: "[-1.0, 1.0]"
    semantics:
      "-1.0": "극부정"
      "0.0": "중립"
      "1.0": "극긍정"

  volatility:
    definition: "엔티티의 불안정도. 외부 충격에 대한 민감도"
    unit: "float"
    range: "[0.0, 1.0]"

  influence_score:
    definition: "엔티티가 다른 엔티티에 미치는 영향력의 크기"
    unit: "float"
    range: "[0.0, inf)"

  susceptibility:
    definition: "엔티티가 외부 영향을 수용하는 정도"
    unit: "float"
    range: "[0.0, 1.0]"

  meta_edge:
    definition: "관계를 생성/소멸시키는 규칙. 엣지가 아니라 엣지를 만드는 조건"
    contrast: "일반 엣지는 사실(fact), 메타엣지는 규칙(rule)"

  community:
    definition: "Leiden 알고리즘에 의해 탐지된 노드 클러스터"
    tiers: "C0(최세밀) ~ C3(최상위)"

  action_type:
    definition: "엔티티가 수행할 수 있는 행동의 유형. 전제조건과 효과를 가짐"
    contrast: "MiroFish는 LLM이 행동을 결정, ComadEye는 Action Type의 전제조건으로 결정론적 판단"

  capability:
    definition: "시스템이 수행할 수 있는 하나의 기능 단위"
    examples: ["entity_extraction", "leiden_community_detection", "causal_dag_construction"]

  binding:
    definition: "두 시스템 컴포넌트 간의 데이터/제어 흐름 연결"
    mechanism: "GraphRAG(지식 연결) + ReBAC(관계 기반 접근/흐름 제어)"

  impact_analysis:
    definition: "어떤 요소를 변경했을 때 영향받는 모든 요소의 목록과 범위를 도출하는 분석"
    scope: "시스템 내부(코드 변경) + 시뮬레이션(그래프 변경) 양쪽 모두 적용"

  active_metadata:
    definition: "구성요소 수정 시 자동으로 변경 맥락을 전파하는 메타데이터 체계"
    contrast: "수동 메타데이터는 기록만 함. 능동 메타데이터는 행동을 유발함"

  propagation:
    definition: "이벤트 영향이 관계 경로를 따라 전파되는 과정. 감쇠율 적용"

  snapshot:
    definition: "시뮬레이션 라운드 종료 시 그래프 상태의 변경분 기록"
    format: "JSONL (diff-based)"

  analysis_space:
    definition: "동일한 시뮬레이션 결과를 서로 다른 위상학적 렌즈로 분석하는 공간"
    types: ["hierarchy", "temporal", "recursive", "structural", "causal", "cross_space"]

  object_type:
    definition: "엔티티의 분류 체계. 기본 5개: Actor, Artifact, Event, Environment, Concept"
    palantir_origin: "Palantir Foundry Ontology의 4요소 중 하나"

  link_type:
    definition: "엔티티 간 관계의 유형. 방향성과 의미 범주를 가짐"
    examples: ["INFLUENCES", "COMPETES_WITH", "DEPENDS_ON", "REACTS_TO"]
