# Layer 7: Logic — 전파 규칙 정의

defaults:
  decay: 0.6
  max_hops: 3
  min_effect_threshold: 0.01

# 관계 유형별 전파 규칙
relationship_rules:
  IMPACTS:
    direction: "forward"
    propagated_properties: ["volatility", "stance"]
    weight_formula: "event.magnitude * edge.weight * target.susceptibility"
    special: "magnitude에 비례"

  DEPENDS_ON:
    direction: "reverse"
    propagated_properties: ["volatility"]
    weight_formula: "source_change * edge.weight * 0.5"
    special: "의존 대상 불안 → 의존자 불안"

  INFLUENCES:
    direction: "forward"
    propagated_properties: ["stance"]
    weight_formula: "source_change * source.influence_score * edge.weight"
    special: "influence_score 가중"

  COMPETES_WITH:
    direction: "bidirectional"
    propagated_properties: ["stance"]
    inversion: true
    weight_formula: "source_change * edge.weight * -0.5"
    special: "한쪽 stance ↑ → 상대 stance ↓ (반전)"

  ALLIED_WITH:
    direction: "bidirectional"
    propagated_properties: ["stance"]
    inversion: false
    weight_formula: "source_change * edge.weight * 0.3"
    special: "한쪽 stance 변화 → 상대 동조"

  LEADS_TO:
    direction: "forward"
    propagated_properties: ["event_activation"]
    weight_formula: "1.0 if source.is_active else 0.0"
    special: "이벤트 체인 트리거"

  REACTS_TO:
    direction: "forward"
    propagated_properties: ["volatility", "stance"]
    weight_formula: "event.magnitude * edge.weight * target.susceptibility * 0.8"
    special: "IMPACTS보다 약한 반응"

  BELONGS_TO:
    direction: "forward"
    propagated_properties: ["stance"]
    weight_formula: "source_change * 0.2"
    special: "소속 관계를 통한 약한 전파"

  SUPPLIES:
    direction: "forward"
    propagated_properties: ["volatility"]
    weight_formula: "source_change * edge.weight * 0.4"
    special: "공급 관계를 통한 volatility 전파"

  REGULATES:
    direction: "forward"
    propagated_properties: ["stance", "volatility"]
    weight_formula: "source_change * source.influence_score * 0.6"
    special: "규제 관계: 강한 단방향 전파"
