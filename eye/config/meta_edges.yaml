# Layer 7: Logic — 메타엣지 규칙 정의
# 메타엣지 = 관계를 생성/소멸/변경시키는 규칙

rules:
  # === 대립 관계 생성 ===
  opposition:
    description: "stance 차이가 큰 엔티티 간 OPPOSES 관계 생성"
    trigger: "on_change"
    watch: ["stance"]
    priority: 10
    conditions:
      - type: property_comparison
        left: "source.stance"
        operator: "-"
        right: "target.stance"
        compare: ">"
        value: 0.6
      - type: relationship_exists
        pattern: "(source)-[:INFLUENCES|COMPETES_WITH|DEPENDS_ON]->(target)"
        condition: "exists"
      - type: relationship_exists
        pattern: "(source)-[:OPPOSES]->(target)"
        condition: "not_exists"
    actions:
      - type: create_edge
        link_type: "OPPOSES"
        source: "source"
        target: "target"
        properties:
          weight: "abs(source.stance - target.stance)"
          confidence: 0.8

  # === 동맹 관계 생성 ===
  alliance:
    description: "stance가 유사하고 같은 커뮤니티인 엔티티 간 ALLIED_WITH 생성"
    trigger: "evaluate"
    priority: 8
    conditions:
      - type: property_comparison
        left: "abs(source.stance - target.stance)"
        compare: "<"
        value: 0.2
      - type: community
        condition: "source.community_id == target.community_id"
      - type: relationship_exists
        pattern: "(source)-[:ALLIED_WITH]->(target)"
        condition: "not_exists"
    actions:
      - type: create_edge
        link_type: "ALLIED_WITH"
        source: "source"
        target: "target"
        properties:
          weight: "1.0 - abs(source.stance - target.stance)"

  # === 안전 자산 도피 ===
  flight_to_safety:
    description: "volatility가 높은 환경에서 고위험→저위험 관계 가중치 이동"
    trigger: "on_change"
    watch: ["volatility"]
    priority: 9
    conditions:
      - type: property_comparison
        left: "source.volatility"
        compare: ">"
        value: 0.7
      - type: property_comparison
        left: "source.object_type"
        compare: "in"
        value: ["Investor", "ForeignInvestor", "InstitutionalInvestor"]
    actions:
      - type: modify_property
        target: "high_risk_edges"
        property: "weight"
        operation: "multiply"
        value: 0.7
      - type: modify_property
        target: "low_risk_edges"
        property: "weight"
        operation: "multiply"
        value: 1.3

  # === 의존성 위기 ===
  dependency_crisis:
    description: "의존 대상의 volatility가 높으면 의존자의 volatility도 증가"
    trigger: "on_change"
    watch: ["volatility"]
    priority: 7
    conditions:
      - type: relationship_exists
        pattern: "(source)-[:DEPENDS_ON]->(target)"
        condition: "exists"
      - type: property_comparison
        left: "target.volatility"
        compare: ">"
        value: 0.5
    actions:
      - type: modify_property
        target: "source"
        property: "volatility"
        operation: "add"
        value: "target.volatility * 0.3"

  # === 영향력 전파 ===
  influence_propagation:
    description: "영향력 높은 엔티티의 stance 변화가 주변으로 전파"
    trigger: "on_change"
    watch: ["stance"]
    priority: 6
    conditions:
      - type: property_comparison
        left: "source.influence_score"
        compare: ">"
        value: 0.7
      - type: relationship_exists
        pattern: "(source)-[:INFLUENCES]->(target)"
        condition: "exists"
    actions:
      - type: modify_property
        target: "target"
        property: "stance"
        operation: "blend"
        value: "source.stance"
        blend_factor: "source.influence_score * 0.2"

  # === 커뮤니티 응집 ===
  community_cohesion:
    description: "같은 커뮤니티 내 stance 수렴 경향"
    trigger: "evaluate"
    priority: 5
    conditions:
      - type: community
        condition: "source.community_id == target.community_id"
      - type: property_comparison
        left: "abs(source.stance - target.stance)"
        compare: ">"
        value: 0.3
    actions:
      - type: modify_property
        target: "source"
        property: "stance"
        operation: "blend"
        value: "community_avg_stance"
        blend_factor: 0.1

  # === 이벤트 체인 ===
  event_chain:
    description: "이벤트가 연결된 잠재 이벤트를 활성화"
    trigger: "on_change"
    watch: ["is_active"]
    priority: 10
    conditions:
      - type: property_comparison
        left: "source.object_type"
        compare: "=="
        value: "Event"
      - type: property_comparison
        left: "source.is_active"
        compare: "=="
        value: true
      - type: relationship_exists
        pattern: "(source)-[:LEADS_TO]->(target:Event)"
        condition: "exists"
      - type: property_comparison
        left: "source.magnitude"
        compare: ">"
        value: 0.5
    actions:
      - type: modify_property
        target: "target"
        property: "is_active"
        operation: "set"
        value: true
      - type: trigger_event
        event: "target"
