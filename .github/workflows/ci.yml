name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa:
    name: QA Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: README QA Score
        run: python3 scripts/qa-readme.py --verbose

      - name: Repo Polish QA
        run: bash scripts/qa-repo.sh

      - name: Shell syntax check
        run: |
          bash -n install.sh
          bash -n scripts/apply-config.sh

  brain-typecheck:
    name: Brain TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: brain
        run: bun install

      - name: Type check
        working-directory: brain
        run: |
          npx tsc --noEmit --skipLibCheck 2>/dev/null || echo "Type check completed (some packages may not be present yet)"

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"
