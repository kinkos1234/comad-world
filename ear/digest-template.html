<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeekNews Daily Digest — {{DATE}}</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --text: #1a1a1a;
    --text-secondary: #6b7280;
    --border: #e5e7eb;
    --accent-red: #dc2626;
    --accent-yellow: #d97706;
    --accent-blue: #2563eb;
    --tag-bg: #f3f4f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 48px 24px;
  }
  header {
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  header .date {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .stats {
    display: flex;
    gap: 16px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .stats span {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .stat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .stat-dot.must { background: var(--accent-red); }
  .stat-dot.recommend { background: var(--accent-yellow); }
  .stat-dot.note { background: var(--accent-blue); }

  .article {
    padding: 20px 0;
    border-bottom: 1px solid var(--border);
  }
  .article:last-child { border-bottom: none; }
  .article-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 8px;
  }
  .relevance-indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-top: 7px;
    flex-shrink: 0;
  }
  .relevance-indicator.must { background: var(--accent-red); }
  .relevance-indicator.recommend { background: var(--accent-yellow); }
  .relevance-indicator.note { background: var(--accent-blue); }
  .article-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
    text-decoration: none;
  }
  .article-title:hover { text-decoration: underline; }
  .article-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 6px 0 6px 22px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .tag {
    background: var(--tag-bg);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
  }
  .article-summary {
    margin-left: 22px;
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
  }
  .article-summary ul {
    list-style: none;
    padding: 0;
  }
  .article-summary li {
    padding: 2px 0;
    padding-left: 14px;
    position: relative;
  }
  .article-summary li::before {
    content: '·';
    position: absolute;
    left: 0;
    color: var(--text-secondary);
    font-weight: 700;
  }
  .article-why {
    margin: 8px 0 8px 22px;
    font-size: 13px;
    color: var(--text);
    background: var(--tag-bg);
    padding: 10px 14px;
    border-radius: 6px;
    line-height: 1.6;
  }
  .article-links {
    margin: 8px 0 0 22px;
    font-size: 12px;
  }
  .article-links a {
    color: var(--text-secondary);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-right: 16px;
  }
  .article-links a:hover { color: var(--text); }

  footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-secondary);
    text-align: center;
  }

  @media print {
    body { background: #fff; }
    .container { padding: 24px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><i data-lucide="newspaper" style="width:20px;height:20px"></i> GeekNews Daily Digest</h1>
    <div class="date">{{DATE}} 08:00 기준 — 전일 수집 기사</div>
    <div class="stats">
      <span><span class="stat-dot must"></span> 필독 {{MUST_COUNT}}건</span>
      <span><span class="stat-dot recommend"></span> 추천 {{RECOMMEND_COUNT}}건</span>
      <span><span class="stat-dot note"></span> 참고 {{NOTE_COUNT}}건</span>
      <span style="margin-left:auto">총 {{TOTAL_COUNT}}건</span>
    </div>
  </header>

  <main>
    {{ARTICLES}}
  </main>

  <footer>
    Generated by CCD GeekNews Curator · Powered by Claude Code
  </footer>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
