name: CI

on:
  push:
    branches: [master, "autoresearch/**"]
  pull_request:
    branches: [master]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun x tsc --noEmit

      - name: Run tests
        run: bun test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check for syntax errors
        run: |
          find packages -name '*.ts' -not -path '*/node_modules/*' | while read f; do
            bun x tsc --noEmit --allowJs "$f" 2>/dev/null || echo "WARN: $f"
          done
