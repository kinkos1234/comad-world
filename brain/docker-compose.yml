services:
  neo4j:
    image: neo4j:5-community
    container_name: knowledge-neo4j
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: neo4j/knowledge2026
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 512m
      NEO4J_dbms_memory_pagecache_size: 256m
    volumes:
      - knowledge-neo4j-data:/data
    restart: unless-stopped

volumes:
  knowledge-neo4j-data:
    external: true
    name: knowledge-ontology_knowledge-neo4j-data
