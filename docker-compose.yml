# Full stack: Neo4j (brain) + Neo4j (eye) + Ollama (eye)
# Usage: docker compose up -d

services:
  # Brain knowledge graph
  brain-neo4j:
    image: neo4j:5-community
    container_name: comad-brain-neo4j
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 512m
      NEO4J_dbms_memory_pagecache_size: 256m
    volumes:
      - brain-neo4j-data:/data
    restart: unless-stopped

  # Eye simulation graph
  eye-neo4j:
    image: neo4j:5-community
    container_name: comad-eye-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512m
    volumes:
      - eye-neo4j-data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Local LLM for Eye simulation
  ollama:
    image: ollama/ollama:latest
    container_name: comad-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  brain-neo4j-data:
  eye-neo4j-data:
  ollama-data:
